spring:
  application:
    name: NauJava

  main:
    allow-bean-definition-overriding: true

  messages:
    encoding: UTF-8

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true
        highlight_sql: true
        hbm2ddl:
          auto: update
  data:
    rest:
      base-path: /api

management:
  endpoints:
    web:
      exposure:
        include: "*"
